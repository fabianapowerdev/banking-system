spring:
  datasource:
    url: ${PRD_DB_URL}
    username: ${PRD_DB_USERNAME}
    password: ${PRD_DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    org.springframework.web: ERROR
    org.hibernate: ERROR
    com.br.banking_system: INFO
